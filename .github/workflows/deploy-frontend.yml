name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**' # Solo corre si cambias código de Next.js
      - '.github/workflows/deploy-frontend.yml'
  
env:
  PROJECT_ID: page-index-489500 
  REGION: us-central1
  REPO_NAME: mi-app-repo
  SERVICE_NAME: nextjs-frontend # El nombre exacto que pusiste en Terraform

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Autenticación en Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Construir y Subir Imagen Docker
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          cd frontend
          
          # ¡AQUÍ ESTÁ LA MAGIA DEL BUILD-ARG!
          # Le pasamos la URL del backend desde las variables de GitHub
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ vars.NEXT_PUBLIC_API_URL }}" \
            -t $IMAGE .
            
          docker push $IMAGE

      - name: Actualizar solo la imagen en Cloud Run
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image $IMAGE \
            --region ${{ env.REGION }} \
            --quiet