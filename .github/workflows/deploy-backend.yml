name: Deploy Backend to Azure

on:
  push:
    branches: [ main ]
    paths: [ 'backend/**' ] # Solo se activa si cambia el backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: pacocharegistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          docker build --platform linux/amd64 -t pacocharegistry.azurecr.io/backend:${{ github.sha }} ./apps/backend
          docker push pacocharegistry.azurecr.io/backend:${{ github.sha }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: pacocharegistry.azurecr.io/backend:${{ github.sha }}
          resourceGroup: pacocha-az
          containerAppName: pacocha-backend # El nombre que le diste en Azure